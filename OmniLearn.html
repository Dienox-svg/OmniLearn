{title:"Git",text:`🧭 Leçon sur Git
Git est un système de gestion de versions qui permet de suivre les modifications d’un projet (souvent du code).

tu casses quelque chose

tu peux revenir à une version précédente

🔁 2. Comment Git fonctionne ?
Git fonctionne comme une suite de “photos” du projet :
chaque modification = une nouvelle version
tu peux avancer ou revenir dans le temps
👉 Ces versions s’appellent des commits.
📦 3. Les commits
Un commit est une sauvegarde de ton projet à un instant donné.
👉 Il contient :
les fichiers modifiés
un message (ce que tu as changé)
un identifiant unique
🌿 4. Les branches
Une branche permet de travailler sur une version parallèle du projet.
👉 Exemple :
branche principale = version stable
autre branche = nouvelles fonctionnalités
👉 Ça évite de casser le projet principal.
🔀 5. Fusion (merge)
Le merge sert à :
prendre une branche

👉 Exemple :

🧱 6. Dépôt (repository)
Un repository (repo) est un dossier de projet suivi par Git.

le code
l’historique

les commits
☁️ 7. Git local vs distant

Git distant : sur un serveur (ex: GitHub)

🔁 8. Cycle de travail Git
Le fonctionnement classique :

🛡️ 9. Pourquoi Git est important ?

{title:"Docker",text:`🐳 Leçon sur Docker

{title:"DevOps",text:`⚙️ Leçon sur le DevOps
Le DevOps est une méthode de travail en informatique qui vise à rapprocher les développeurs (Dev) et les équipes d’exploitation (Ops) pour créer et déployer des logiciels plus rapidement et plus efficacement.
👉 En simple : DevOps = faire collaborer ceux qui créent le logiciel et ceux qui le font fonctionner.
🧠 1. Pourquoi DevOps existe ?
Avant DevOps :
les développeurs créaient le logiciel
une autre équipe le déployait
communication lente ❌
erreurs fréquentes ❌
mises à jour longues ❌
👉 DevOps a été créé pour accélérer et simplifier tout ça.
🔁 2. Le principe de DevOps
DevOps suit un cycle continu :
créer du code
tester automatiquement
déployer sur un serveur
surveiller le système
améliorer en continu
👉 C’est un processus en boucle.
🚀 3. Objectifs principaux
DevOps sert à :
livrer des logiciels plus vite
réduire les bugs
automatiser les tâches répétitives
améliorer la stabilité des systèmes
faciliter les mises à jour
🤝 4. Dev vs Ops
👨‍💻 Dev (développeurs)
écrivent le code
créent les fonctionnalités
corrigent les bugs
🖥️ Ops (exploitation)
gèrent les serveurs
déploient les applications
surveillent la performance
👉 DevOps = fusion de ces deux mondes.
⚙️ 5. Automatisation (très important)
DevOps repose énormément sur l’automatisation :
tests automatiques
déploiement automatique
surveillance automatique
👉 objectif : éviter les tâches manuelles répétitives.
📦 6. Exemple simple
Sans DevOps :
une mise à jour prend des jours
Avec DevOps :
une mise à jour peut être déployée en quelques minutes
☁️ 7. DevOps et cloud
DevOps est souvent utilisé avec le cloud :
serveurs en ligne
infrastructures flexibles
déploiement rapide
🧰 8. Outils DevOps (exemples connus)
gestion de code (Git)
automatisation (CI/CD)
conteneurs (Docker)
orchestration (Kubernetes)
monitoring (surveillance des systèmes)
🔄 9. CI/CD (concept clé)
CI (Continuous Integration) : intégrer et tester le code en continu
CD (Continuous Delivery/Deployment) : déployer automatiquement
👉 but : livraison rapide et fiable
🛡️ 10. Pourquoi DevOps est important ?
moins d’erreurs humaines
déploiements plus rapides
meilleure stabilité
travail plus fluide entre équipes
🧩 11. À retenir
DevOps, c’est :
⚙️ une méthode qui automatise et relie développement + déploiement pour améliorer la production logicielle
🚀 12. Parcours simple pour apprendre DevOps
bases Linux
Git (version de code)
réseau et serveurs
CI/CD
conteneurs (Docker)
cloud et monitoring`}

👉 Exemple mental : “faire une action précise quand on l’appelle”

modifier du texte
changer des couleurs
ajouter ou supprimer des éléments
réagir aux interactions utilisateur
👉 C’est comme si JavaScript pouvait “réécrire” la page en direct.
📡 8. JavaScript et internet (API)

météo
réseaux sociaux

login / comptes

🎮 9. Exemple concret de projet
Avec JavaScript tu peux créer :

{title:"API",text:`🔌 Leçon sur les API (Application Programming Interface)
Une API est un système qui permet à deux logiciels de communiquer entre eux.
👉 En simple : c’est un serveur qui permet à une application de demander et recevoir des données d’une autre application.
🧠 1. Exemple simple
Imagine un restaurant 🍔 :
toi = application
serveur = API
cuisine = serveur / base de données
👉 Tu commandes :
“Je veux un burger”
👉 Le serveur (API) va chercher la réponse et te la ramène.
🌐 2. Comment fonctionne une API ?
Une application envoie une requête (request)
L’API traite la demande
Elle renvoie une réponse (response)
📦 Format souvent utilisé :
JSON (le plus courant)
parfois XML
📡 3. Exemple concret
Tu utilises une app météo :
l’app ne connaît pas la météo directement
elle demande à une API météo 🌦️
l’API renvoie :
température
humidité
prévisions
🔧 4. Types d’API
🌍 API Web (HTTP API)
Utilisée sur internet :
REST API (la plus courante)
GraphQL (plus moderne)
💻 API système
Permet à un logiciel de parler au système :
Windows API
Android API
📱 API mobile
Utilisée par les applications smartphone
⚙️ 5. Exemple de requête API (simplifié)
GET https://api.meteo.com/paris
Réponse :
{
  "ville": "Paris",
  "temperature": 22,
  "temps": "ensoleillé"
}
🔑 6. API Key (clé API)
Beaucoup d’API demandent une clé :
👉 comme un mot de passe
Exemple :
permet d’identifier l’utilisateur
limite les abus
contrôle les accès
🛡️ 7. Sécurité des API
Les API peuvent être protégées par :
clés API 🔑
tokens (JWT)
HTTPS 🔐
permissions (authentification)
🚨 8. Risques des API mal sécurisées
fuite de données
accès non autorisé
attaques automatisées
surcharge du serveur
📊 9. API dans la vie quotidienne
Tu utilises des API sans t’en rendre compte :
météo 🌦️
Google Maps 🗺️
Instagram / TikTok 📱
paiements en ligne 💳
jeux en ligne 🎮
🧩 10. À retenir
Une API, c’est :
🔌 un pont qui permet à deux logiciels de communiquer et échanger des données`},

{title:"HTTPS",text:`🔐 Leçon sur HTTPS
Le HTTPS est une version sécurisée du protocole HTTP, utilisé pour accéder aux sites web.
👉 En simple : c’est le système qui permet de naviguer sur internet de façon chiffrée et sécurisée.
🌐 1. HTTP vs HTTPS
Protocole
Signification
Sécurité
HTTP
HyperText Transfer Protocol
❌ non sécurisé
HTTPS
HTTP Secure
🔐 sécurisé
👉 HTTPS ajoute une couche de protection appelée chiffrement.
🧠 2. Comment fonctionne HTTPS ?
Quand tu visites un site HTTPS :
ton navigateur se connecte au site
ils s’échangent une clé de chiffrement
toutes les données deviennent illisibles pour les autres
📌 Résultat :
tes mots de passe
tes messages
tes paiements
👉 sont protégés
🔐 3. Le cadenas 🔒
Quand tu vois :
🔒 https://
Cela signifie :
connexion chiffrée
site vérifié (certificat SSL/TLS)
🧾 4. Les certificats SSL/TLS
Pour activer HTTPS, un site doit avoir un certificat de sécurité.
👉 Il prouve que :
le site est bien celui qu’il prétend être
la connexion est chiffrée
🧪 5. Exemple simple
Sans HTTPS :
quelqu’un sur le Wi-Fi peut intercepter tes données
Avec HTTPS :
même s’il intercepte, il ne comprend rien (données chiffrées)
🛡️ 6. Pourquoi HTTPS est important ?
Il protège contre :
vol de mots de passe
interception de données
attaques “man-in-the-middle”
espionnage sur Wi-Fi public
⚠️ 7. Limites de HTTPS
HTTPS ne protège pas contre tout :
❌ ne bloque pas les virus
❌ ne protège pas si le site est malveillant
❌ ne rend pas anonyme
👉 il protège فقط la connexion, pas le contenu du site
🌍 8. Où HTTPS est utilisé ?
Aujourd’hui :
sites bancaires 💳
réseaux sociaux 📱
moteurs de recherche 🔎
presque tous les sites modernes
👉 HTTP seul devient rare
🧩 9. À retenir
HTTPS, c’est :
🔐 un protocole qui chiffre les données entre ton appareil et un site web
👉 il garantit confidentialité et sécurité des échanges`},
{title:"SEO",text:`🔎 Leçon sur le SEO (Search Engine Optimization)
Le SEO est l’ensemble des techniques utilisées pour améliorer la visibilité d’un site web sur les moteurs de recherche (comme Google).
👉 En simple : c’est ce qui permet à un site d’apparaître plus haut dans les résultats quand tu fais une recherche.
🧠 1. Comment fonctionne le SEO ?
Quand tu recherches quelque chose :
Google analyse des millions de pages
Puis il classe les résultats selon :
pertinence
qualité du contenu
vitesse du site
popularité
👉 Le SEO sert à “plaire” à ces critères.
🌐 2. Les moteurs de recherche
Les principaux :
Google → le plus utilisé au monde
Microsoft (via Bing) → moteur concurrent
autres : DuckDuckGo, Yahoo
⚙️ 3. Les 3 piliers du SEO
🧱 SEO technique
Tout ce qui concerne la structure du site :
vitesse de chargement
mobile-friendly 📱
sécurité (HTTPS)
architecture propre
✍️ SEO contenu
C’est ce que tu écris :
mots-clés pertinents
articles utiles
titres clairs
contenu complet et lisible
🔗 SEO popularité (backlinks)
Quand d’autres sites parlent de toi :
liens entrants
mentions
réputation
👉 Plus tu es cité, plus Google te fait confiance.
🔑 4. Les mots-clés
Un mot-clé, c’est ce que les gens tapent dans Google.
Exemple :
“meilleur VPN”
“comment apprendre le hacking”
“jeu gratuit PS5”
👉 Le SEO consiste à utiliser ces mots intelligemment.
📊 5. Exemple simple
Sans SEO :
ton site est page 10 → personne ne le voit
Avec SEO :
ton site est page 1 → beaucoup de visites
🚀 6. Ce que Google aime
contenu clair et utile
sites rapides
pages sécurisées
expérience utilisateur propre
contenu original
⚠️ 7. Black hat SEO (à éviter)
Certaines techniques “trichent” :
bourrage de mots-clés
faux liens
contenu copié
👉 Risque : Google peut pénaliser ou supprimer le site
🧩 8. À retenir
Le SEO, c’est :
🔎 l’art de rendre un site visible sur les moteurs de recherche
👉 objectif : attirer plus de visiteurs naturellement (sans pub payante)`}
],

{title:"IP",text:`🌐 Leçon sur l’IP (Internet Protocol)
Une adresse IP est un identifiant unique attribué à chaque appareil connecté à un réseau (internet ou local).
👉 En simple : c’est la “plaque d’immatriculation” de ton appareil sur internet.
🧠 1. À quoi sert une IP ?
L’adresse IP permet de :
identifier un appareil 📱💻
envoyer et recevoir des données 📦
communiquer sur internet 🌐
👉 Sans IP, internet ne saurait pas où envoyer les informations.
📡 2. Exemple simple
Quand tu regardes une vidéo :
YouTube doit savoir où envoyer la vidéo
Donc :
ton appareil a une IP
le serveur YouTube a une IP
les données circulent entre les deux
🔢 3. Les types d’adresses IP
🌍 IPv4
Format classique :
192.168.1.1
4 blocs de chiffres
le plus utilisé encore aujourd’hui
limité en nombre d’adresses
🚀 IPv6
Format moderne :
2001:0db8:85a3::8a2e:0370:7334
beaucoup plus long
presque illimité
créé pour remplacer IPv4
🏠 4. IP publique vs IP privée
🌐 IP publique
visible sur internet
donnée par ton fournisseur internet
identifie ton réseau (box)
🏠 IP privée
utilisée dans ta maison (Wi-Fi)
attribuée par ta box
ex : 192.168.x.x
👉 ton téléphone et ton PC ont des IP privées différentes
🔁 5. IP statique vs dynamique
Type
Description
Statique
ne change jamais
Dynamique
change régulièrement
👉 la plupart des utilisateurs ont une IP dynamique
🎮 6. IP dans les jeux et apps
L’IP sert à :
connecter les joueurs
envoyer les actions en ligne
synchroniser les serveurs
👉 mais elle ne donne pas accès direct à ton appareil
⚠️ 7. Ce que ton IP peut révéler
Ton IP peut donner :
ton pays 🌍
ta ville approximative 📍
ton fournisseur internet 📶
❌ mais pas :
ton nom
ton adresse exacte
tes mots de passe
🛡️ 8. Sécurité de l’IP
Risques possibles :
attaques réseau (DDoS)
traçage approximatif
scan de ports
👉 mais une IP seule ne suffit pas pour “pirater” quelqu’un
🔒 9. Comment cacher son IP ?
VPN 🔐 (ex : NordVPN / Proton VPN)
proxy 🌐
réseau Tor 🧅
🧩 10. À retenir
Une adresse IP, c’est :
🌐 l’identifiant unique de ton appareil sur un réseau
👉 elle permet aux données de savoir où aller et d’où venir.`},
{title:"DNS",text:`🌐 Leçon sur le DNS (Domain Name System)
Le DNS est un système qui sert à traduire les noms de sites web en adresses IP.
👉 En simple : c’est le “annuaire d’internet”.
🧠 1. Pourquoi le DNS existe ?
Les ordinateurs ne comprennent pas les noms comme :
google.com
youtube.com
Ils comprennent des adresses IP, par exemple :
142.250.74.14
👉 Le DNS fait la conversion :
google.com → adresse IP du serveur Google
⚙️ 2. Comment ça fonctionne ?
Quand tu tapes un site :
Tu écris www.youtube.com
Ton appareil demande au DNS : “c’est quoi l’IP ?”
Le DNS répond avec l’adresse IP
Ton navigateur se connecte au serveur
📌 Tout ça en quelques millisecondes ⚡
📡 3. Exemple simple
Sans DNS :
tu devrais retenir des chiffres compliqués
Avec DNS :
tu tapes juste un nom facile
🧩 4. Les types de DNS
🏠 DNS de ton fournisseur (FAI)
fourni par ton opérateur internet
souvent automatique
⚡ DNS publics
🔵 Google DNS
8.8.8.8
rapide et fiable
🟣 Cloudflare DNS
1.1.1.1
très rapide + orienté confidentialité
🔁 5. DNS vs IP
Élément
Rôle
Nom de domaine
google.com
DNS
traduit le nom
Adresse IP
localisation du serveur
⚡ 6. Pourquoi le DNS est important ?
Sans DNS :
internet serait très compliqué
tu devrais mémoriser des IP
Avec DNS :
navigation simple
accès rapide aux sites
🚨 7. Problèmes DNS
Parfois le DNS peut causer :
sites qui ne chargent pas
erreur “serveur introuvable”
lenteur de navigation
🛡️ 8. Sécurité DNS
Un DNS peut être attaqué (DNS spoofing) : 👉 faux site renvoyé à la place du vrai
C’est pour ça qu’on utilise :
DNS sécurisés
chiffrement (DNS over HTTPS)
🔧 9. Comment changer son DNS ?
Sur téléphone ou PC tu peux choisir :
DNS rapide
DNS sécurisé
DNS avec filtrage (bloque pubs ou sites dangereux)

Le DNS, c’est :
🌐 le système qui transforme les noms de sites en adresses IP
👉 sans lui, internet serait inutilisable pour les humains.`},
{title:"WiFi",text:`📶 Leçon sur le Wi-Fi

📡 2. Les ondes Wi-Fi

fréquence 2.4 GHz (longue portée, plus lente)

⚡ 3. 2.4 GHz vs 5 GHz
Bande
Avantages
Inconvénients

grande portée 📍
plus lent, interférences
5 GHz
rapide ⚡
portée plus faible

murs
meubles

micro-ondes

connexion qui coupe

🔧 8. Comment améliorer ton Wi-Fi
rapprocher la box

passer en 5 GHz si possible
limiter les appareils connectés
redémarrer la box
utiliser un câble Ethernet pour le gaming
📊 9. Wi-Fi vs Ethernet
Wi-Fi
Ethernet
sans fil 📶
câble 🔌
pratique
plus stable
parfois instable
très fiable
un peu de latence

{title:"Packet",text:`📦 Leçon sur les “packets” (paquets réseau)
Un packet (paquet de données) est une petite unité d’information envoyée sur un réseau (internet, Wi-Fi, etc.).
👉 En simple : quand tu envoies une info sur internet, elle est coupée en petits morceaux appelés packets.
🧠 1. Comment ça fonctionne ?
Quand tu fais une action (ouvrir un site, envoyer un message, jouer en ligne) :
tes données sont découpées en packets
chaque packet voyage séparément
ils arrivent au serveur
ils sont réassemblés dans le bon ordre
📌 Exemple :
une image ou une vidéo = des centaines/milliers de packets
🌐 2. Ce qu’il y a dans un packet
Un packet contient 2 parties :
📦 Données
le contenu (texte, image, son…)
🏷️ En-tête (header)
adresse de l’expéditeur
adresse du destinataire
numéro du packet
infos de contrôle
🚚 3. Exemple simple
Tu envoies un message :
“Salut”
Le réseau peut envoyer :
Packet 1 : “Sa”
Packet 2 : “lu”
Packet 3 : “t”
👉 Le serveur réassemble → “Salut”
🎮 4. Packets dans les jeux vidéo
Dans un jeu en ligne :
ton mouvement = packets envoyés
les autres joueurs = packets reçus
👉 Si tout va bien :
jeu fluide
👉 Si problème :
lag
téléportation
désynchronisation
⚠️ 5. Packet loss (perte de packets)
Parfois, des packets n’arrivent pas :
❌ causes :
Wi-Fi faible
réseau saturé
serveur instable
👉 effets :
freeze
lag
actions qui ne se valident pas
📊 6. Latence vs Ping vs Packets
Terme
Signification
Packet
unité de données 📦
Ping
temps de réponse ⏱️
Latence
délai global du réseau 🌐
🔁 7. Pourquoi on utilise des packets ?
Parce que c’est :
plus rapide
plus fiable
adaptable aux réseaux instables
optimisé pour internet mondial
🧩 8. À retenir
Un packet, c’est :
📦 un petit morceau de données envoyé sur internet
👉 internet fonctionne comme un système de livraison de millions de petits colis.`},
{title:"Ping",text:`📡 Leçon sur le ping
Le ping est une mesure qui indique le temps que met un message à aller de ton appareil à un serveur puis à revenir.
👉 En simple : c’est le temps de réponse d’une connexion internet.
🧠 1. Comment ça fonctionne ?
Ton ordinateur envoie un petit paquet de données appelé “ping” :
Ton appareil → serveur → ton appareil
⏱️ Le temps total de ce trajet = ping
📌 Il est mesuré en millisecondes (ms).
🎮 2. Ping en jeux vidéo
Le ping est super important dans les jeux en ligne :
tu cliques (tirer, sauter)
le serveur reçoit l’action
le serveur renvoie la réponse
👉 Si le ping est élevé :
décalage (lag)
actions retardées
impression de “freeze”
📊 3. Valeurs de ping
Ping
Qualité
Effet
0–20 ms
Excellent ⚡
ultra fluide
20–50 ms
Très bon
quasi parfait
50–100 ms
moyen
léger délai
100–200 ms
mauvais
lag visible
200+ ms
très mauvais
injouable
⚙️ 4. Ping vs latence
👉 Les deux sont très proches :
Latence = temps de réponse global
Ping = mesure concrète de cette latence
📌 En pratique, on utilise souvent “ping” pour parler de la latence réseau.
🌐 5. Ce qui influence le ping
📍 Distance du serveur
Plus il est loin → ping plus élevé
📶 Qualité de connexion
Wi-Fi faible
4G instable
réseau saturé
🖥️ Serveur surchargé
Plus il y a de joueurs → plus lent
🔁 Route des données
Les données passent par plusieurs routeurs
🧪 6. Exemple concret
Serveur en France → ping 20 ms 🇫🇷
Serveur aux USA → ping 120 ms 🇺🇸
🛡️ 7. Comment réduire son ping ?
utiliser un câble Ethernet
se connecter à un serveur proche
fermer les applications qui utilisent internet
éviter le Wi-Fi saturé
redémarrer routeur si nécessaire
🔍 8. Comment tester son ping ?
Tu peux :
lancer un test de vitesse internet
utiliser la commande ping sur PC
regarder directement dans les jeux
🧩 9. À retenir
Le ping, c’est :
⏱️ le temps de réponse entre toi et un serveur
👉 plus il est bas → meilleure est la réactivité`},
{title:"Latency",text:`⚡ Leçon sur la latence (Latency)
La latence, c’est le temps de retard entre une action et sa réponse dans un système informatique ou réseau.
👉 En simple : c’est le temps que met une information à voyager et revenir.
🧠 1. Exemple simple
Tu cliques sur une vidéo YouTube :
clic → serveur reçoit la demande → vidéo commence
⏱️ Le temps entre le clic et le début = latence
🌐 2. Latence en réseau
Dans internet, la latence correspond au temps que met un paquet de données pour aller :
ton appareil → serveur → ton appareil
📌 Elle est mesurée en millisecondes (ms)
10 ms → très rapide ⚡
50 ms → correct
100+ ms → lag visible
300+ ms → très lent (surtout en jeux)
🎮 3. Latence dans les jeux vidéo
La latence est cruciale dans le gaming :
tu tires → le serveur réagit → l’action est visible
👉 si la latence est élevée :
décalage
“lag”
ennemis qui teleportent
mauvaise réactivité
📡 4. Ce qui cause la latence
Plusieurs facteurs :
📍 Distance
Plus le serveur est loin → plus c’est lent
🌐 Qualité de la connexion
Wi-Fi faible
réseau saturé
4G/5G instable
🖥️ Serveur lent
Si le serveur est surchargé → délai
📦 Route des données
Les données passent par plusieurs “points” (routeurs)
📊 5. Latence vs débit (important)
Beaucoup confondent :
Terme
Signification
Latence
Temps de réponse ⏱️
Débit
Quantité de données 📥
👉 Tu peux avoir :
internet rapide MAIS avec du lag (latence élevée)
internet lent MAIS réactif (latence faible)
🧪 6. Exemple concret
Vidéo streaming → besoin de bon débit
Jeux en ligne → besoin de faible latence
🧱 7. Comment réduire la latence ?
utiliser Ethernet (câble)
se rapprocher du Wi-Fi
choisir un serveur proche
fermer les apps en arrière-plan
éviter les réseaux saturés
🔬 8. Latence en informatique (plus large)
La latence existe aussi dans :
processeurs (CPU)
mémoire RAM
stockage SSD/HDD
serveurs cloud
👉 partout où il y a un délai entre action et réponse
🧩 9. À retenir
La latence, c’est :
⏱️ le temps de réaction d’un système
👉 plus elle est basse → meilleure est l’expérience`}

"Cybersecurité": [
{title:"Firewall",text:`🧱 Leçon sur les Firewalls (pare-feu)
Un firewall (pare-feu) est un système de sécurité qui sert à contrôler les connexions entre ton appareil et internet.
👉 En simple : c’est un gardien qui décide ce qui peut entrer ou sortir de ton réseau.
🧠 1. Comment fonctionne un firewall ?
Quand une connexion arrive (jeu, site web, appli…) :
le firewall analyse la connexion
il compare avec des règles de sécurité
il décide :
✅ autoriser
❌ bloquer
📌 Exemple :
ton navigateur → autorisé
un programme suspect → bloqué
🔐 2. À quoi sert un firewall ?
🛡️ Protection contre les attaques
Il bloque :
intrusions de hackers
accès non autorisés
ports dangereux
🌐 Contrôle du trafic internet
Il peut filtrer :
sites web
applications
connexions entrantes/sortantes
🦠 Limiter les malwares
Un malware qui essaie de “communiquer” avec internet peut être bloqué.
🧱 3. Types de firewalls
💻 Firewall logiciel
Installé sur ton appareil (PC, téléphone)
Exemple :
Windows Defender Firewall
👉 intégré à Windows, protège ton PC directement
🌐 Firewall réseau
Installé sur un routeur ou serveur
👉 protège tout un réseau (école, entreprise, maison)
☁️ Firewall cloud
Géré en ligne par des services de sécurité
👉 utilisé par les grandes entreprises
⚙️ 4. Comment il décide ce qu’il bloque ?
Il utilise des règles comme :
adresse IP (qui envoie la connexion)
port réseau (ex: 80, 443)
type de programme
protocole (HTTP, TCP, etc.)
🚨 5. Exemple simple
❌ Un programme inconnu essaie d’envoyer des données vers internet
👉 firewall : bloque
✔️ Ton navigateur ouvre un site connu
👉 firewall : autorise
⚠️ 6. Limites du firewall
ne détecte pas toujours les virus dans les fichiers
ne protège pas si tu installes un malware toi-même
dépend des règles configurées
👉 donc il ne remplace pas un antivirus
🏢 7. Firewalls connus (entreprises)
Cisco → solutions réseau très utilisées en entreprise
pfSense → firewall open-source puissant pour réseaux
🧩 8. À retenir
Un firewall :
surveille les connexions
bloque les accès suspects
protège ton réseau
👉 C’est la première ligne de défense contre les attaques réseau.`},
{title:"VPN",text:`🔐 Leçon sur les VPN (Virtual Private Network)
Un VPN est un outil qui permet de créer une connexion internet sécurisée et chiffrée entre ton appareil et internet.
👉 En simple : ça agit comme un tunnel privé entre toi et le web.
🧠 1. Comment fonctionne un VPN ?
Normalement :
Ton appareil → Fournisseur internet → Sites web
Avec un VPN :
Ton appareil → Serveur VPN → Sites web
📌 Résultat :
ton IP est cachée
tes données sont chiffrées
ton trafic est plus difficile à surveiller
🔒 2. À quoi sert un VPN ?
🕵️‍♂️ Protection de la vie privée
Ton fournisseur internet ne voit plus exactement ce que tu fais.
🌍 Changer de localisation
Tu peux apparaître dans un autre pays :
France → USA
France → Japon
📶 Sécurité sur Wi-Fi public
Très utile dans :
cafés
écoles
gares
👉 Ça évite que quelqu’un intercepte tes données.
🚫 Contourner certaines restrictions
sites bloqués
contenus géo-limités
⚠️ 3. Ce qu’un VPN ne fait PAS
Beaucoup de gens se trompent :
❌ Un VPN ne rend pas invisible
❌ Un VPN ne protège pas contre tous les virus
❌ Un VPN ne remplace pas un antivirus
❌ Un VPN ne rend pas les actions illégales “safe”
🧨 4. Les limites et risques
certains VPN gratuits vendent tes données
vitesse internet parfois réduite
tous les sites ne sont pas compatibles
confiance nécessaire envers le fournisseur
🏆 5. Exemples de VPN connus
🟢 NordVPN
NordVPN Official Site⁠�
👉 Très connu, bon niveau de sécurité et vitesse
🟣 Proton VPN
Proton VPN Official Site⁠�
👉 Basé en Suisse, focus sur la confidentialité
🔵 ExpressVPN
ExpressVPN Official Site⁠�
👉 Simple à utiliser, très populaire
🛡️ 6. Comment bien choisir un VPN ?
Regarde :
politique “no logs” (pas d’enregistrement)
vitesse
pays de l’entreprise
réputation
transparence
🧩 7. À retenir
Un VPN sert surtout à :
protéger ta vie privée
sécuriser tes connexions
masquer ton IP
👉 Mais ce n’est pas une “armure magique”.`},
{title:"Malware",text:`Un malware est un programme conçu pour nuire à un appareil, voler des données ou prendre le contrôle d’un système sans le consentement de l’utilisateur.
🧠 1. C’est quoi un malware ?
Le mot vient de “malicious software” (logiciel malveillant).
Un malware peut :
ralentir ton téléphone ou PC
voler tes mots de passe
espionner tes actions
bloquer tes fichiers
transformer ton appareil en “robot” contrôlé à distance
🧨 2. Les principaux types de malwares
🦠 Virus
Se colle à un fichier ou programme et se propage quand tu l’ouvres.
🪱 Ver (worm)
Se propage tout seul sur les réseaux sans action de l’utilisateur.
🐴 Trojan (cheval de Troie)
Se cache dans un programme “normal” (jeu crack, appli fake…) 👉 Très utilisé pour tromper les victimes
🕵️ Spyware
Espionne l’utilisateur :
clavier (keylogger)
messages
mots de passe
caméra/micro parfois
💣 Ransomware
Chiffre tes fichiers et demande une rançon pour les récupérer.
📢 Adware
Affiche des pubs agressives ou injectées dans le système.
🤖 Bot / Botnet
Transforme ton appareil en machine contrôlée à distance (DDoS, spam, etc.)
⚠️ 3. Comment les malwares infectent un appareil
Les méthodes les plus courantes :
télécharger des APK / logiciels crackés
cliquer sur liens suspects (phishing)
pièces jointes d’emails inconnus
sites web infectés
fausses mises à jour (“Update Flash Player”)
clés USB infectées
🚨 4. Symptômes d’un appareil infecté
téléphone ou PC très lent
batterie qui se vide vite
pubs qui apparaissent toutes seules
applications inconnues installées
surchauffe
connexions internet bizarres
comptes piratés
🛡️ 5. Comment se protéger
installer uniquement des apps officielles (Play Store, App Store)
éviter les cracks et APK inconnus
garder le système à jour
utiliser un antivirus fiable
ne pas cliquer sur liens suspects
vérifier les permissions des applications
🔐 6. Exemple simple
❌ Tu installes un “jeu gratuit modifié” → il contient un Trojan
👉 résultat : vol de comptes + espionnage possible
🧩 7. À retenir
Un malware ne “se voit pas toujours”, il agit souvent en silence.
👉 Les 3 règles d’or :
méfiance des fichiers inconnus
pas de liens suspects
sources officielles uniquement`},
{title:"Phishing",text:`Le phishing (hameçonnage) est une technique de fraude utilisée pour tromper une personne afin qu’elle divulgue des informations sensibles : mots de passe, codes bancaires, identifiants, etc.
🧠 1. C’est quoi le phishing ?
Le phishing consiste à se faire passer pour une entité fiable (banque, Google, Instagram, école, administration…) afin de te pousser à :
cliquer sur un lien
ouvrir une pièce jointe
entrer tes informations personnelles
🎯 2. Les objectifs des hackers
Les attaquants veulent généralement :
voler des mots de passe
accéder à des comptes (réseaux sociaux, mail, banque)
récupérer des données bancaires
installer un malware
usurper une identité
📩 3. Les formes les plus courantes
📧 Email phishing
Un mail qui semble officiel :
“Votre compte sera suspendu”
“Connexion suspecte détectée”
“Mise à jour obligatoire”
👉 Il contient souvent un lien piégé.
📱 SMS phishing (smishing)
Messages du type :
“Votre colis est bloqué”
“Clique ici pour confirmer votre identité”
📞 Vishing (par téléphone)
Quelqu’un t’appelle en se faisant passer pour :
ta banque
un support technique
un service officiel
🌐 Faux sites web
Des pages qui ressemblent à de vrais sites :
Instagram fake login
banque copiée
Google falsifié
⚠️ 4. Les signes d’une tentative de phishing
Voici les alertes les plus importantes :
orthographe bizarre ou fautes
urgence (“agissez immédiatement”)
lien suspect ou raccourci étrange
adresse email étrange (ex: support@goog1e-security.xyz)
demande de mot de passe (les vrais services ne demandent jamais ça par mail)
sentiment de pression ou menace
🧪 5. Exemple simple
❌ Faux mail :
“Votre compte Netflix sera fermé. Cliquez ici pour vérifier”
✔️ Vrai réflexe :
ne pas cliquer
aller directement sur Netflix via l’application ou le site officiel
🛡️ 6. Comment se protéger
utiliser l’authentification à deux facteurs (2FA)
vérifier les liens avant de cliquer
ne jamais donner ses mots de passe
utiliser un gestionnaire de mots de passe
garder ses applications et son téléphone à jour
🧩 7. Ce qu’il faut retenir
Le phishing joue sur 3 choses :
la peur
l’urgence
la confiance
Si un message te pousse à agir vite → ⚠️ méfiance immédiate.
🔐 Bonus (niveau cyber)
Les attaques modernes peuvent être très sophistiquées :
pages clonées quasi identiques
mails très bien écrits
usurpation de domaine (typosquatting)
phishing ciblé (spear phishing)`},
{title:"Cryptographie",text:`Leçon complète : La cryptographie
La cryptographie est la science qui permet de protéger les informations en les transformant de manière à ce que seules les personnes autorisées puissent les lire ou les utiliser. Elle est au cœur de la sécurité sur Internet : navigation HTTPS, messageries sécurisées, paiements en ligne, signatures numériques, VPN, etc.
1. Qu'est-ce que la cryptographie ?
Le mot vient du grec :
Kryptos = caché
Graphia = écriture
La cryptographie consiste à utiliser des algorithmes mathématiques pour assurer plusieurs objectifs de sécurité.
2. Les objectifs de la cryptographie
Confidentialité
Seules les personnes autorisées peuvent lire les données.
Exemple : un message chiffré.
Intégrité
Vérifier que les données n'ont pas été modifiées.
Exemple : comparaison d'une empreinte (hash).
Authentification
Vérifier l'identité d'un utilisateur, d'un serveur ou d'un document.
Non-répudiation
Empêcher un auteur de nier qu'il a signé ou envoyé un document.
3. Le vocabulaire
Terme
Définition
Texte en clair
Donnée lisible avant chiffrement
Chiffrement
Transformation du texte en clair
Texte chiffré
Résultat illisible sans la clé
Déchiffrement
Retour au texte original
Clé
Information utilisée par l'algorithme
4. Comment fonctionne le chiffrement ?
Texte clair
      │
      ▼
 Algorithme + clé
      │
      ▼
 Texte chiffré
      │
      ▼
 Déchiffrement avec la clé appropriée
      │
      ▼
 Texte clair
5. Le chiffrement symétrique
Une même clé sert à chiffrer et à déchiffrer.
Clé secrète
     │
Alice ─────────► Bob
Avantages
Très rapide.
Adapté aux gros volumes de données.
Inconvénient
Il faut transmettre la clé de manière sécurisée.
Algorithmes connus
Advanced Encryption Standard (AES)
ChaCha20
6. Le chiffrement asymétrique
Deux clés différentes sont utilisées :
Une clé publique (partagée).
Une clé privée (gardée secrète).
Clé publique  → Chiffrer
Clé privée    → Déchiffrer
Avantages
Pas besoin de partager une clé secrète au départ.
Permet les signatures numériques.
Inconvénients
Plus lent que le chiffrement symétrique.
Algorithmes connus
RSA (cryptosystem)
Elliptic-curve cryptography (ECC)
7. Pourquoi utiliser les deux ?
Dans la pratique, les protocoles modernes combinent les deux approches :
Le chiffrement asymétrique sert à établir ou échanger une clé de session.
Le chiffrement symétrique protège ensuite les données, car il est beaucoup plus rapide.
C'est notamment le principe utilisé par les connexions HTTPS.
8. Les fonctions de hachage
Une fonction de hachage produit une empreinte unique d'une donnée.
Exemple d'usages :
Vérification de fichiers.
Signatures numériques.
Stockage sécurisé des mots de passe (avec des fonctions adaptées).
Des exemples de familles de hachage incluent SHA-2 et SHA-3.
9. Les signatures numériques
Une signature numérique permet de :
prouver l'identité du signataire ;
vérifier que le document n'a pas été modifié.
Principe simplifié :
Calcul d'un hash du document.
Signature de ce hash avec la clé privée.
Vérification avec la clé publique.
10. Les certificats numériques
Un certificat numérique associe une clé publique à une identité.
Il est délivré par une autorité de certification (CA).
Les navigateurs utilisent ces certificats pour vérifier l'identité des sites HTTPS.
11. HTTPS
Quand tu visites un site sécurisé :
Navigateur
      │
      ▼
 Échange sécurisé de clés
      │
      ▼
 Chiffrement des données
      │
      ▼
 Communication protégée
Cela protège les échanges contre l'écoute sur le réseau.
12. Les nombres aléatoires
La sécurité dépend aussi de la qualité des nombres aléatoires utilisés pour générer des clés, des jetons et des paramètres cryptographiques.
Un générateur faible peut compromettre un système pourtant basé sur de bons algorithmes.
13. Les attaques courantes
Quelques exemples :
Attaque par force brute (essayer de nombreuses clés).
Attaque par dictionnaire (tester des mots de passe courants).
Attaque de l'homme du milieu (Man-in-the-Middle) si les échanges ne sont pas correctement authentifiés.
Exploitation d'une mauvaise implémentation.
Souvent, les erreurs de configuration ou de programmation sont plus dangereuses que les algorithmes eux-mêmes.
14. Les bonnes pratiques
Utiliser des algorithmes modernes et éprouvés.
Maintenir les logiciels à jour.
Employer des mots de passe longs et uniques.
Activer l'authentification à plusieurs facteurs lorsque c'est possible.
Ne pas créer son propre algorithme cryptographique.
15. Où trouve-t-on la cryptographie ?
Elle est utilisée dans :
Les sites HTTPS.
Les applications bancaires.
Les messageries chiffrées.
Les VPN.
Les cartes bancaires.
Les passeports électroniques.
Les blockchains.
Les signatures électroniques.
Les mises à jour logicielles.
16. Les principaux domaines de la cryptographie
Cryptographie symétrique : protéger les données avec une clé secrète.
Cryptographie asymétrique : échange de clés, authentification et signatures.
Fonctions de hachage : intégrité et identification des données.
Signatures numériques : preuve d'origine et d'intégrité.
Protocoles cryptographiques : combinaison de plusieurs techniques pour sécuriser les communications (par exemple HTTPS).`},
{title:"Hash",text:`Leçon complète : Les fonctions de hachage (Hash)
Le hachage (hashing) est une technique fondamentale en informatique et en cybersécurité. Une fonction de hachage transforme une donnée (texte, fichier, mot de passe, image, etc.) en une empreinte numérique de longueur fixe appelée hash ou empreinte.
1. Qu'est-ce qu'un hash ?
Un hash est le résultat produit par une fonction de hachage.
Exemple :
Message :
Bonjour

Hash (SHA-256) :
2ec5a3f0c2fc3e6dcee0f6f3a5735a6c69d2056579a5452095b75802094043a8
Le hash est une représentation de la donnée, mais il ne permet pas de retrouver directement le contenu d'origine.
2. À quoi sert un hash ?
Les fonctions de hachage sont utilisées pour :
Vérifier l'intégrité d'un fichier.
Stocker des mots de passe de façon plus sûre (avec des techniques adaptées comme le salage et des fonctions spécialisées).
Signer numériquement des documents.
Identifier des fichiers.
Détecter des modifications.
3. Les propriétés d'une bonne fonction de hachage
Une fonction de hachage cryptographique doit être :
Déterministe
La même entrée produit toujours le même hash.
Bonjour
↓

Même hash
Rapide à calculer
Le calcul doit être efficace, même pour de gros fichiers.
Sensible aux modifications
Modifier un seul caractère change complètement le résultat.
Exemple :
Bonjour
et
bonjour
produisent des hashes très différents.
C'est ce qu'on appelle souvent l'effet avalanche.
Résistante aux collisions
Il doit être extrêmement difficile de trouver deux données différentes qui produisent le même hash.
À sens unique
Il n'existe pas de méthode pratique permettant de retrouver la donnée d'origine à partir du hash seul.
4. Comment fonctionne un hash ?
De manière simplifiée :
Message
     │
     ▼
Fonction de hachage
     │
     ▼
Hash
Quelle que soit la taille du message, la sortie a une longueur fixe (pour une fonction donnée).
5. Longueur des hashes
Quelques exemples :
Algorithme
Taille
MD5
128 bits
SHA-1
160 bits
SHA-256
256 bits
SHA-512
512 bits
Les fonctions comme MD5 et SHA-1 ne sont plus recommandées pour des usages de sécurité en raison de vulnérabilités connues.
6. Collision
Une collision se produit lorsque deux données différentes produisent le même hash.
Une bonne fonction de hachage rend ce phénomène extrêmement difficile à provoquer intentionnellement.
7. Effet avalanche
Changer un seul caractère modifie profondément le hash.
Exemple :
Bonjour
↓
Hash A
BonjouR
↓
Hash B (très différent)
Cette propriété aide à détecter toute modification, même minime.
8. Hash et chiffrement : quelle différence ?
Hachage
Chiffrement
À sens unique
Réversible avec la bonne clé
Sert à vérifier ou identifier
Sert à protéger la confidentialité
Ne nécessite pas de clé
Utilise une ou plusieurs clés
9. Vérification d'intégrité
Quand un fichier est publié, son hash peut être fourni.
Le destinataire :
Télécharge le fichier.
Calcule son hash.
Compare avec le hash publié.
Si les deux correspondent, cela indique que le fichier n'a probablement pas été modifié.
10. Les mots de passe
Les systèmes modernes ne stockent généralement pas les mots de passe en clair. Ils stockent une représentation dérivée obtenue avec des fonctions adaptées au stockage de mots de passe, souvent accompagnées d'un sel (salt) unique.
Aujourd'hui, les fonctions recommandées incluent notamment Argon2id, bcrypt et scrypt, conçues pour résister davantage aux attaques.
11. Les principales fonctions de hachage
MD5
Très rapide.
Obsolète pour la sécurité.
Encore utilisé dans certains contextes de vérification non critiques.
SHA-1
Plus robuste que MD5 à l'origine.
Également considéré comme obsolète pour les usages de sécurité.
SHA-2
Famille comprenant :
SHA-224
SHA-256
SHA-384
SHA-512
Très largement utilisée.
SHA-3
Nouvelle famille normalisée, reposant sur une conception différente de SHA-2.
12. Applications
Les fonctions de hachage sont utilisées pour :
Vérifier les téléchargements.
Les signatures numériques.
Les certificats.
Les systèmes de contrôle de versions.
Les blockchains.
Les bases de données.
Les systèmes d'authentification.
13. Bonnes pratiques
Utiliser des algorithmes modernes et adaptés à l'usage.
Ne pas utiliser MD5 ou SHA-1 pour de nouveaux systèmes de sécurité.
Vérifier les empreintes des logiciels téléchargés lorsqu'elles sont publiées par une source officielle.
Pour les mots de passe, utiliser des fonctions dédiées comme Argon2id, bcrypt ou scrypt, avec un sel unique.`}
],

{title:"Onion Routing",text:`Leçon complète : L'Onion Routing (Routage en oignon)
L'Onion Routing est une technique de communication anonyme qui constitue le principe de fonctionnement du réseau Tor. Son objectif est de rendre beaucoup plus difficile l'association entre un utilisateur et sa destination sur Internet.
1. Définition
Le routage en oignon consiste à faire passer les données par plusieurs relais successifs. Chaque relais ne connaît que :
le relais précédent ;
le relais suivant.
Aucun relais ne connaît à la fois l'origine et la destination finale.
L'image de l'« oignon » vient du fait que les données sont protégées par plusieurs couches de chiffrement, retirées une à une à chaque étape.
2. Pourquoi utiliser l'Onion Routing ?
Il sert à :
protéger la confidentialité des communications ;
limiter la possibilité de suivre un utilisateur à travers le réseau ;
contourner certaines formes de censure ;
permettre à des services sensibles (journalisme, recherche, droits humains) d'être accessibles de manière plus confidentielle.
3. Les relais Tor
Un circuit Tor est généralement composé de trois types de relais :
Utilisateur
      │
      ▼
 Relais d'entrée (Guard)
      │
      ▼
 Relais intermédiaire
      │
      ▼
 Relais de sortie
      │
      ▼
 Internet
Relais d'entrée (Guard)
Premier relais du circuit.
Il connaît ton adresse IP.
Il ne connaît pas la destination finale.
Relais intermédiaire
Transmet les données.
Ne connaît ni l'origine réelle ni la destination finale.
Relais de sortie
Dernier relais.
Envoie la requête vers Internet (pour les sites classiques).
Ne connaît pas l'identité de l'utilisateur.
Pour les onion services, il n'y a généralement pas de relais de sortie vers Internet : la communication reste entièrement dans le réseau Tor.
4. Les couches de chiffrement
Avant d'envoyer un message, le client applique plusieurs couches de chiffrement.
Schéma simplifié :
Message
   ↓
Couche 3
   ↓
Couche 2
   ↓
Couche 1
À chaque relais :
une couche est retirée ;
le relais obtient uniquement les informations nécessaires pour transmettre le message au relais suivant.
5. Création d'un circuit
De façon simplifiée :
Le client sélectionne plusieurs relais.
Il établit une connexion sécurisée avec chacun.
Il construit un circuit.
Les données circulent ensuite dans ce circuit jusqu'à son renouvellement.
6. Pourquoi trois relais ?
Trois relais offrent un bon compromis entre :
confidentialité ;
performances ;
fiabilité.
Ajouter davantage de relais augmenterait la latence sans forcément améliorer beaucoup la protection.
7. Exemple de parcours
Imaginons :
Alice consulte un site web via Tor.
Le trajet ressemble à ceci :
Alice
   │
Guard
   │
Middle
   │
Exit
   │
Site Web
Le site web voit principalement l'adresse IP du relais de sortie, pas celle d'Alice.
8. Onion Routing et onion services
Lorsqu'un utilisateur accède à un onion service :
Utilisateur
      │
      ▼
 Réseau Tor
      │
      ▼
 Point de rendez-vous
      │
      ▼
 Onion Service
Le serveur et le client restent tous deux à l'intérieur du réseau Tor, sans exposer directement leurs adresses IP.
9. Avantages
Protection accrue de la vie privée.
Pas de lien direct entre l'utilisateur et la destination.
Architecture distribuée.
Chiffrement des communications à l'intérieur du réseau Tor.
10. Limites
L'Onion Routing n'est pas une garantie d'anonymat absolu.
Des facteurs comme :
une mauvaise configuration ;
des logiciels vulnérables ;
des erreurs de l'utilisateur (par exemple révéler volontairement son identité) ;
peuvent réduire la confidentialité.
11. Différences avec un VPN
Onion Routing
VPN
Plusieurs relais
Un seul serveur
Réseau décentralisé
Fournisseur unique
Aucun relais ne voit tout le trajet
Le fournisseur VPN peut voir une grande partie du trafic qui le traverse
Généralement plus lent
Souvent plus rapide
Les deux technologies répondent à des besoins différents et ne sont pas interchangeables.
12. Concepts importants à connaître
Pour aller plus loin, il est utile de comprendre :
le chiffrement asymétrique ;
les clés publiques et privées ;
les circuits Tor ;
les relais d'entrée (guards) ;
les points d'introduction et de rendez-vous (pour les onion services) ;
les descripteurs de services ;
la différence entre anonymat, confidentialité et sécurité.`},
{title:"Hidden Services",text:`Leçon : Les Hidden Services (Services cachés) sur le réseau Tor
Objectif : Comprendre ce que sont les hidden services (aujourd'hui appelés onion services), comment ils fonctionnent, à quoi ils servent et quels sont leurs usages légitimes.
1. Définition
Un hidden service (ou onion service) est un service hébergé sur le réseau Tor, accessible uniquement via une adresse se terminant par .onion.
Contrairement à un site web classique :
Il n'est pas directement accessible depuis Internet.
Son serveur n'expose pas son adresse IP publique.
Les communications passent entièrement par le réseau Tor.
2. Pourquoi les onion services existent-ils ?
Ils ont été conçus pour protéger la confidentialité et l'anonymat.
Usages légitimes :
Journalisme dans des pays où la presse est censurée.
Messageries sécurisées.
Signalement anonyme d'informations.
Hébergement de services sensibles.
Recherche académique et cybersécurité.
Comme toute technologie, ils peuvent aussi être détournés à des fins illégales, mais cela ne représente pas leur seul usage.
3. Comment fonctionne Tor ?
Tor fait passer les communications à travers plusieurs relais chiffrés.
Schéma simplifié :
Utilisateur
      │
      ▼
 Relais d'entrée
      │
      ▼
 Relais intermédiaire
      │
      ▼
 Point de rendez-vous
      │
      ▼
 Onion Service
Chaque relais ne connaît qu'une partie du trajet, ce qui renforce la confidentialité.
4. Les adresses .onion
Une adresse .onion ressemble à une longue chaîne de caractères suivie de .onion.
Caractéristiques :
Générées à partir d'une clé cryptographique.
Difficiles à mémoriser.
Uniques.
5. Les versions d'adresses
Aujourd'hui, la version utilisée est v3.
Les anciennes adresses v2 ont été abandonnées pour des raisons de sécurité.
Les adresses v3 sont plus longues et offrent une meilleure protection cryptographique.
6. Comment un client trouve un onion service ?
À un niveau élevé :
Le service publie des informations de connexion sur le réseau Tor.
Le client récupère ces informations.
Les deux parties établissent un point de rendez-vous au sein du réseau Tor.
Une connexion chiffrée est créée sans que le client ou le serveur ne révèle directement son adresse IP.
7. Sécurité
Les avantages :
Adresse IP du serveur masquée.
Chiffrement de bout en bout au sein du réseau Tor.
Résistance accrue à certaines formes de surveillance réseau.
Les limites :
Un service peut toujours être compromis par une mauvaise configuration ou des failles applicatives.
L'anonymat dépend aussi des pratiques de l'utilisateur.
8. Cas d'utilisation légitimes
Portails d'information résistants à la censure.
Dépôts de documents.
Services de messagerie.
Portails de signalement pour les lanceurs d'alerte.
Sites d'organisations souhaitant offrir un accès via Tor.
9. Bonnes pratiques
Si tu explores des onion services :
Utilise le navigateur Tor officiel.
Vérifie les adresses .onion avant de les consulter.
Évite de communiquer des informations personnelles.
Garde ton navigateur et ton système à jour.
Sois prudent face aux contenus frauduleux ou trompeurs.
10. Mythes fréquents
« Tout ce qui est sur Tor est illégal. »
Faux. De nombreux services ont des usages légitimes.
« Tor rend totalement anonyme. »
Faux. Tor améliore la confidentialité, mais l'anonymat dépend aussi du comportement de l'utilisateur et de la sécurité de son appareil.
« Les adresses .onion sont impossibles à retrouver. »
Les adresses ne sont pas indexées comme le Web classique, mais certaines sont référencées volontairement par leurs propriétaires ou dans des annuaires spécialisés.
11. Lien avec l'OSINT
Pour les analystes OSINT, les onion services peuvent constituer une source d'information supplémentaire dans certains contextes (par exemple, des publications d'organisations ou des plateformes de divulgation). Cependant, ils ne remplacent pas les sources ouvertes du Web classique et doivent être évalués avec le même esprit critique : vérifier la provenance, recouper les informations et distinguer les faits des rumeurs.
Niveau 1 : Les bases
Commence par comprendre :
Ce qu'est le réseau Tor.
La différence entre Internet, le Deep Web et le Dark Web.
Ce qu'est un onion service.
Pourquoi les adresses se terminent par .onion.
Les notions de chiffrement et de routage en oignon (onion routing).
À maîtriser :
Circuit Tor.
Relais d'entrée, intermédiaires et de sortie.
Point de rendez-vous.
Clés publiques et privées.
Niveau 2 : Fonctionnement d'un onion service
Étudie l'architecture générale :
Utilisateur
      │
      ▼
  Réseau Tor
      │
      ▼
 Point de rendez-vous
      │
      ▼
 Onion Service
Comprends les concepts suivants :
Publication des descripteurs du service.
Points d'introduction.
Point de rendez-vous.
Établissement de la connexion.
Authentification cryptographique du service.
Niveau 3 : Comprendre les adresses v3
Les onion services modernes utilisent des adresses v3.
Tu peux apprendre :
Pourquoi elles sont longues.
Comment elles sont dérivées d'une clé cryptographique.
Pourquoi elles permettent de vérifier l'identité du service.
Niveau 4 : Héberger un onion service (dans un laboratoire)
Dans un environnement de test contrôlé, tu peux apprendre à :
Installer Tor sur une machine.
Configurer un service local (par exemple un petit serveur web).
Publier ce service comme onion service.
Tester son accessibilité avec le navigateur Tor.
C'est une excellente façon de comprendre le fonctionnement interne sans exposer le service à Internet.
Niveau 5 : Administration
Apprends à :
Lire les journaux (logs) de Tor.
Comprendre les fichiers de configuration.
Gérer les clés du service.
Mettre à jour Tor.
Sauvegarder correctement la configuration.
Niveau 6 : Sécurité
Étudie :
Les bonnes pratiques de configuration.
Les risques liés aux applications hébergées.
Les fuites d'informations possibles.
Les mises à jour de sécurité.
La séparation entre le service et les données sensibles.
Niveau 7 : Développement
Si tu sais programmer, tu peux explorer :
Des applications accessibles uniquement via un onion service.
Des API internes.
Des interfaces d'administration protégées.
Des outils de test dans un laboratoire.
Niveau 8 : OSINT et recherche
Tu peux apprendre à :
Identifier des onion services publiquement référencés.
Vérifier la légitimité d'une adresse .onion.
Croiser les informations avec des sources du Web classique.
Évaluer la fiabilité d'un contenu.
Compétences utiles à développer
Pour bien comprendre les onion services, il est utile de connaître :
Les bases des réseaux (TCP/IP, DNS, HTTP/HTTPS).
Les fondamentaux de Linux.
Les notions de cryptographie (clés, signatures, chiffrement).
L'administration système.
Les principes de la cybersécurité.
Ressources recommandées
Pour apprendre avec des sources fiables :
La documentation officielle de Tor (Tor Project).
Le manuel de Tor.
Des livres sur les réseaux et la sécurité.
Des laboratoires pratiques dans une machine virtuelle.`},
{title:"OSINT",text:`Leçon complète sur l'OSINT (Open Source Intelligence)
1. Qu'est-ce que l'OSINT ?
L'OSINT (Open Source Intelligence), ou renseignement en sources ouvertes, consiste à collecter, analyser et exploiter des informations accessibles légalement au public.
L'OSINT est utilisé par :
Les forces de l'ordre
Les journalistes
Les enquêteurs privés
Les entreprises
Les chercheurs
Les analystes en cybersécurité
Les hackers éthiques (pentesters)
L'objectif n'est pas de pirater un système, mais de trouver des informations disponibles publiquement.
2. Les principes fondamentaux
Une enquête OSINT repose sur quatre étapes :
Collecte
On rassemble les informations disponibles.
Exemple :
Nom
Pseudonyme
Email
Numéro de téléphone
Adresse
Photos
Entreprise
Vérification
Il faut toujours vérifier qu'une information est vraie.
On croise plusieurs sources.
Une seule source n'est jamais suffisante.
Analyse
On relie les informations entre elles.
Exemple :
Email → Réseaux sociaux → Entreprise → Photos → Localisation
Rapport
Les résultats sont présentés clairement avec les sources.
3. Les différentes catégories d'OSINT
Personnes
Recherche de :
Nom complet
Alias
Date de naissance (si publique)
Réseaux sociaux
Emploi
Photos
Publications
Contacts
Entreprises
Recherche de :
Employés
Domaines internet
Emails
Fuites de données
Organigramme
Infrastructure informatique
Sites Web
Recherche de :
Sous-domaines
Technologies utilisées
Hébergement
DNS
Certificats SSL
Historique
Réseaux sociaux
Analyse de :
Facebook
Instagram
TikTok
X
LinkedIn
Reddit
Images
Analyse :
Métadonnées (EXIF)
Géolocalisation
Recherche inversée
Reconnaissance d'objets
Documents
Analyse :
PDF
Word
Excel
Métadonnées
Auteur
Logiciel utilisé
4. Les sources d'information
Sources publiques
Sites web
Blogs
Forums
Réseaux sociaux
Sites gouvernementaux
Journaux
Bases de données
Exemples :
Registres des entreprises
Cadastre (selon les pays)
Registres judiciaires publics (lorsqu'ils existent)
Brevets
Publications scientifiques
Archives
Exemple :
L'historique d'un site internet.
Moteurs de recherche
Les moteurs permettent déjà énormément de recherches.
On peut utiliser :
Google
Bing
DuckDuckGo
5. Les Google Dorks
Les Google Dorks permettent d'affiner les recherches.
Exemples :
site:example.com
Recherche uniquement sur un site.
filetype:pdf
Recherche des PDF.
intitle:"login"
Recherche les pages contenant "login" dans le titre.
inurl:admin
Recherche des URL contenant "admin".
"email@example.com"
Recherche un email exact.
6. Les outils OSINT les plus connus
Recherche générale
Maltego
SpiderFoot
Recon-ng
Recherche d'emails
Hunter.io
EmailRep
Domaines
SecurityTrails
DNSDumpster
Sous-domaines
Amass
Subfinder
Images
Google Lens
TinEye
Géolocalisation
Google Earth
OpenStreetMap
Métadonnées
ExifTool
7. Les réseaux sociaux
Les réseaux sociaux sont une immense source d'informations.
On peut y trouver :
Localisation
Famille
Amis
Habitudes
Travail
Centres d'intérêt
Voyages
Dates importantes
8. Les métadonnées
Les fichiers contiennent souvent :
Auteur
Date
GPS
Logiciel utilisé
Appareil photo
Modèle du téléphone
Les métadonnées sont parfois supprimées lors de la publication sur certains réseaux sociaux.
9. Les recherches inversées
On peut rechercher :
Une image
Un visage
Un logo
Un bâtiment
Pour retrouver :
La source originale
Une meilleure qualité
D'autres sites utilisant la même image
10. Les recherches sur les domaines
Informations utiles :
Propriétaire (si public)
DNS
Serveurs
Sous-domaines
Certificats
Historique
11. Les fuites de données
Des services permettent de vérifier si une adresse e-mail apparaît dans une fuite de données connue. Ils ne donnent pas accès aux données privées, mais indiquent si un compte a été compromis et dans quel contexte. Si votre propre adresse apparaît, changez les mots de passe concernés et activez l'authentification à deux facteurs.
12. Les bases de données publiques
On peut consulter :
Entreprises
Marques
Brevets
Publications
Décisions de justice publiques (selon les pays)
Marchés publics
13. Les techniques d'analyse
Une bonne enquête consiste à :
Identifier les informations clés.
Vérifier les sources.
Croiser les données.
Établir une chronologie.
Cartographier les relations.
Documenter chaque conclusion.
14. Les limites de l'OSINT
L'OSINT ne permet pas de :
Accéder à des comptes privés.
Contourner des mots de passe.
Pirater des systèmes.
Obtenir des données non publiques sans autorisation.
Usurper une identité.
Il s'appuie uniquement sur des informations légalement accessibles.
15. Les aspects juridiques et éthiques
Un praticien de l'OSINT doit :
Respecter la vie privée.
Respecter les lois locales (par exemple le RGPD en Europe).
Vérifier la fiabilité des informations.
Éviter le harcèlement ou le doxxing.
Utiliser les informations uniquement dans un cadre légal et légitime.
16. Méthodologie d'une enquête OSINT
Définir l'objectif.
Identifier les sources pertinentes.
Collecter les informations publiques.
Vérifier et recouper les données.
Analyser les relations et la chronologie.
Rédiger un rapport clair avec les sources utilisées.
17. Compétences utiles
Pour progresser en OSINT, il est utile de développer :
La pensée critique.
La recherche avancée sur le Web.
L'analyse de données.
Les bases des réseaux informatiques et du DNS.
La connaissance des réseaux sociaux.
La rédaction de rapports.
Le respect des règles juridiques et déontologiques.
18. Domaines d'application
L'OSINT est utilisé pour :
La cybersécurité et le test d'intrusion.
Les enquêtes journalistiques.
La veille concurrentielle.
La lutte contre la fraude.
Les investigations numériques.
La gestion des risques.
Les enquêtes académiques.
La réponse aux incidents de sécurité.
Leçon 2 : Apprendre l'OSINT de A à Z (Cours pratique)
Cette leçon est conçue pour t'apprendre la méthode, pas seulement les outils. Le plus important en OSINT est de savoir où chercher, comment vérifier et comment organiser les informations.
Objectifs de la leçon
À la fin de ce cours, tu sauras :
Comprendre la démarche d'une enquête OSINT.
Trouver des informations publiques de manière structurée.
Vérifier la fiabilité des informations.
Organiser tes découvertes.
Produire un rapport clair.
Chapitre 1 : L'état d'esprit d'un analyste
Avant de chercher, pose-toi ces questions :
Quel est mon objectif ?
Quelles informations me manquent ?
Où pourraient-elles être publiées ?
Comment puis-je les vérifier ?
Une enquête OSINT est un puzzle : chaque information est une pièce qui doit être confirmée par d'autres sources.
Chapitre 2 : Définir un objectif
Ne cherche jamais "tout". Définis une question précise.
Exemples :
Identifier le propriétaire d'un site web.
Vérifier les informations publiques d'une entreprise.
Reconstituer la chronologie d'un événement.
Cartographier les sources publiques sur un sujet.
Un objectif clair évite de se disperser.
Chapitre 3 : Cartographier les sources
Liste les catégories de sources qui pourraient répondre à ton objectif :
Type de source
Exemples
Sites officiels
Administrations, entreprises
Médias
Presse, communiqués
Réseaux sociaux
Publications publiques
Bases de données
Registres accessibles au public
Images
Photos, cartes, vues satellites
Documents
Rapports, PDF, présentations
Chapitre 4 : Collecter les informations
Lorsque tu trouves une information, note immédiatement :
La source.
La date.
L'auteur (si connu).
Le lien.
Ce qui est un fait et ce qui est une hypothèse.
Ne modifie pas les informations d'origine.
Chapitre 5 : Vérifier les informations
Une information n'est fiable que si elle peut être recoupée.
Par exemple :
Une annonce d'entreprise → vérifier sur le site officiel.
Une photo → comparer avec d'autres images et le contexte.
Une affirmation → rechercher si plusieurs sources indépendantes la confirment.
Chapitre 6 : Construire une chronologie
Classe les éléments par ordre temporel :
Date
Événement
Source
5 mars
Publication A
Source 1
12 mars
Publication B
Source 2
18 mars
Déclaration C
Source 3
Une chronologie aide à comprendre les liens entre les événements.
Chapitre 7 : Organiser les informations
Tu peux utiliser une structure simple :
Objectif
│
├── Personnes
├── Organisations
├── Lieux
├── Documents
├── Images
└── Chronologie
Cette organisation facilite l'analyse et la rédaction.
Chapitre 8 : Évaluer la fiabilité
Pose-toi ces questions :
La source est-elle identifiable ?
Est-elle récente ?
A-t-elle un intérêt particulier à présenter les faits d'une certaine manière ?
D'autres sources indépendantes confirment-elles ces informations ?
Chapitre 9 : Erreurs fréquentes
À éviter :
Croire la première information trouvée.
Confondre une hypothèse avec un fait.
Oublier de noter les sources.
Utiliser des informations sorties de leur contexte.
Négliger la date de publication.
Chapitre 10 : Rédiger un rapport
Un bon rapport contient :
L'objectif.
La méthode utilisée.
Les sources consultées.
Les faits observés.
Les limites de l'enquête.
La conclusion.
Les faits doivent être distingués des interprétations.
Exercices
Exercice 1 : Vérification d'une information
Choisis un communiqué de presse ou un article d'actualité. Cherche au moins deux autres sources indépendantes qui confirment ou nuancent les informations principales.
Exercice 2 : Analyse d'un site web
Observe un site public et note :
Les coordonnées de contact.
Les pages importantes.
Les documents téléchargeables.
Les informations sur l'organisation.
Les dates de mise à jour visibles.
Exercice 3 : Chronologie
À partir d'un événement public, crée une chronologie avec les annonces, articles et communiqués officiels.
Conseils pour progresser
Lis régulièrement des enquêtes journalistiques pour comprendre leur méthode.
Entraîne-toi sur des sujets publics et légitimes.
Documente toujours tes sources.
Garde un esprit critique.
Respecte les lois et la vie privée.
Plan d'apprentissage sur 8 semaines
Semaine 1 : principes de l'OSINT et recherche avancée sur le Web.
Semaine 2 : analyse des sites web et des documents publics.
Semaine 3 : recherche dans les registres publics et les bases de données.
Semaine 4 : vérification des images et géolocalisation.
Semaine 5 : analyse des réseaux sociaux et vérification des profils publics.
Semaine 6 : organisation des données, chronologies et cartographie des relations.
Semaine 7 : rédaction de rapports et évaluation de la fiabilité des sources.
Semaine 8 : réalisation d'une enquête complète sur un sujet public en appliquant toutes les étapes précédentes.`},
{title:"Dox",text:`Leçon Complète : Le Doxing (Document Intelligence & OSINT)
Table des matières
Définition et概念
Légal et Éthique Cadre Légal et Éthique
Méthodologie Générale
Sources d'information (OSINT)
Techniques de Collecte
Corrélation et analyse
Outils essentiels
Cas pratiques
Contre-mesures et protection
Glossaire
1. Définition et concepts
Qu'est-ce que le Doxing ?
Le doxing (ou doxxing , contraction de "dropping documents" ou "docs" ) est l'acte de rechercher et de publier des informations personnelles identifiables (PII) sur un individu ou une organisation à partir de sources publiques.

Types d'informations recherchées


Catégorie	Exemples
Identité civile	Nom complet, date de naissance, numéro de sécurité sociale
Coordonnées	Adresse postale, numéro de téléphone, email
Numériques	Pseudo, adresses IP, comptes réseaux sociaux, handles
Professionnels	Employeur, poste, diplômes, certifications
Financières	Comptes bancaires, transactions, cryptomonnaies
Famille/Entourage	Conjoint, enfants, parents, associés
Activités	Centres d'intérêt, affiliations politiques, religieuses
Objectifs courants
Reconnaissance pré-attaque : phase de collecte d'informations sur une cible
Audit de confidentialité : évaluation de l'exposition d'une personne ou d'une organisation
Social Engineering : préparer des attaques d'ingénierie sociale ciblées
Red teaming : simuler un adversaire déterminé
2. Cadre Légal et Éthique
Rappel important
Le doxing sans autorisation est illégal dans la majorité des juridictions. Cette leçon est destinée exclusivement aux professionnels de la sécurité autorisés dans le cadre de missions légitimes (pentest, audit, red team).

Réglementations applicables
RGPD (UE) : ​​protection des données personnelles
CCPA (Californie) : Loi californienne sur la protection de la vie privée des consommateurs
Computer Fraud and Abuse Act (États-Unis) : accès non autorisé
Code pénal (FR) : articles 226-1 à 226-24 (atteinte à la vie privée)
Périmètre autorisé en pentest
Informations publiquement accessibles (OSINT passif)
Informations obtenues via des comptes test autorisés
Dans le défini par le contrat de mission
3. Méthodologie Générale
Le doxing suit une approche méthodique en 5 phases :




1. Identification Initiale
   ↓
2. Collecte (OSINT passif → actif)
   ↓
3. Corrélation & Recoupement
   ↓
4. Enrichissement
   ↓
5. Rapport & Documentation
Phase 1 : Identification Initiale
Sur une partie généralement d'un point d'entrée :

Un pseudo / surnom
Un email
Un numéro de téléphone
Un nom
Une photo
Un identifiant de compte (Steam, Discord, Twitter, etc.)
Phase 2 : Collecte
On distingue deux niveaux :

OSINT Passif : collecte sans interaction directe avec la cible (moteurs de recherche, registres publics, réseaux sociaux)
OSINT Actif : interaction contrôlée (requêtes DNS, WHOIS, scraping, social Engineering léger)
Phase 3 : Corrélation
C'est l'étape la plus critique : relier les fragments d'information entre eux pour reconstituer un profil complet.

Techniques de corrélation :

Email comme pivot : un email peut être lié à des comptes, des forums, des achats
Pseudo commun : un même pseudo utilisé sur plusieurs plateformes
Géolocalisation croisée : horaires de publication, fuseaux horaires, adresses IP
Photo EXIF ​​: métadonnées GPS, appareil, date
Phase 4 : Enrichissement
Une fois un profil partiel établi, sur creuse :

Recherche d'historiques (Wayback Machine, archives)
Recherche de fuites / brèches (Have I Been Pwned)
Recherche de comptes dormants ou oubliés
Phase 5 : Rapport
Documentation complète avec :

Sources vérifiées
Niveau de confiance par information
Recommandations de remédiation

9. Contre-Mesures et Protection
9.1 Pour les Individus
OpSec (Sécurité opérationnelle) de base :

Pseudos uniques : utiliser un pseudo différent par plateforme
Emails jetables : pour les inscriptions sans importance
Vérifier ses expositions : HIBP, DeHashed régulièrement
Supprimer les comptes inactifs : une source d'info dormante
Paramètres de confidentialité : auditeur régulièrement
Photos sans EXIF ​​: utiliser un outil comme ExifPurge
VPN : pour masquer l'IP réelle
Numéro virtuel : Google Voice, numéro Skype, etc.
Recommandations avancées :

Alertes Google : sur son nom, pseudo, email
Désinscription des sites d'annuaire : pipl, spokeo, truepeoplesearch
Confidentialité Whois : pour les propriétaires de domaines
Comptes séparés : vie pro vs vie perso
Ne pas utiliser le même pseudo sur GitHub que sur les réseaux sociaux
9.2 pour les Organisations
Politique OSINT : évaluer régulièrement l'exposition
Formation des employés : Sensibilisation OpSec
Réduction de la surface d'attaque : limiter les informations publiques
Monitoring : détection de fuites de données
Réponse à incident : procédure en cas de doxing

/* =========================
   🎯 AFFICHAGE MENU
   ========================= */

const menu=document.getElementById("menu");

function loadMenu(){
    menu.innerHTML="";

    for(let cat in data){
        let div=document.createElement("div");
        div.className="category";

        let title=document.createElement("h2");
        title.innerText=cat;

        let grid=document.createElement("div");
        grid.className="grid";

        data[cat].forEach(item=>{
            let btn=document.createElement("button");
            btn.innerText=item.title;

            btn.onclick=()=>{
                openLesson(cat,item);
            };

            grid.appendChild(btn);
        });

        div.appendChild(title);
        div.appendChild(grid);
        menu.appendChild(div);
    }
}

/* =========================
   📖 OUVRIR LECON
   ========================= */

function openLesson(cat,item){
    document.getElementById("menu").style.display="none";
    document.getElementById("lesson").classList.remove("hidden");

    document.getElementById("category").innerText=cat;
    document.getElementById("title").innerText=item.title;
    document.getElementById("text").innerText=item.text;
}

/* =========================
   🔙 RETOUR MENU
   ========================= */

function backMenu(){
    document.getElementById("menu").style.display="block";
    document.getElementById("lesson").classList.add("hidden");
}

/* START */
loadMenu();
